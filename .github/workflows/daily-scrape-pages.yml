name: Daily Scrape and Deploy Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/daily-scrape-pages.yml'
      - 'scraper.py'
      - 'scrape_now.py'
      - 'state_portals.json'
  schedule:
    - cron: '45 2 * * *'
    - cron: '45 14 * * *'

permissions:
  contents: write

concurrency:
  group: daily-scrape-pages
  cancel-in-progress: false

jobs:
  scrape-and-build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
      ONLYJOBS_LIMIT_LATEST_JOBS: '80'
      ONLYJOBS_LIMIT_RESULTS: '60'
      ONLYJOBS_LIMIT_ADMIT_CARDS: '60'
      ONLYJOBS_LIMIT_ANSWER_KEYS: '40'
      ONLYJOBS_LIMIT_PRIVATE_JOBS: '80'
      ONLYJOBS_LIMIT_REMOTE_JOBS: '80'
      ONLYJOBS_LIMIT_UPSC_ACTIVE: '12'
      ONLYJOBS_LIMIT_UPSC_RECRUITMENT: '6'
      ONLYJOBS_LIMIT_IBPS_RECRUITMENT: '12'
      ONLYJOBS_LIMIT_RAC_RECRUITMENT: '4'
      ONLYJOBS_LISTING_PAGE_LIMIT: '20'
      ONLYJOBS_FJA_STATE_PAGE_LIMIT: '1'
      ONLYJOBS_REQUEST_DELAY_SECONDS: '0.1'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install scraper dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run scraper
        run: python scrape_now.py

      - name: Commit updated data snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data.json; then
            echo "No data.json changes to commit."
          else
            git add data.json
            git commit -m "chore: refresh scraped job data"
            git push origin HEAD:${{ github.ref_name }}
          fi
